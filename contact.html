<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar">
    <div class="logo">CarZone</div>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="cars.html">Cars</a></li>
        <li><a href="about.html" class="active">About</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>
</nav>
</body>
  <div class="page-bg">

    <div class="contact-rectangle">
      <h1>Contact Us</h1>

      <form id="contactForm">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" required>

        <label>Email</label>
<input 
  type="email" 
  name="email" 
  placeholder="Enter your email" 
  required
>
        <label>Phone Number</label>
<input 
  type="tel" 
  name="phone" 
  placeholder="Enter your phone number"
  pattern="[0-9]{10}" 
  maxlength="10"
  required
>
        <label>Location</label>
        <input type="text" id="location" placeholder="Enter your location" required>

        <label>Message</label>
        <textarea id="message" placeholder="Type your message" required></textarea>

        <button type="submit">Send Message</button>

        <p id="successMessage" style="display:none;">
          Thank you for contacting us! We will get back to you soon.
        </p>
      </form>

      <!-- Download button (for you only) -->
      <button id="downloadBtn" style="margin-top:10px;">Download All Submissions</button>

      <div class="social">
        <a href="#">Instagram</a>
        <a href="#">Facebook</a>
        <a href="#">Twitter</a>
      </div>
    </div>

  </div>

  <script>
    const form = document.getElementById("contactForm");
    const successMessage = document.getElementById("successMessage");
    const downloadBtn = document.getElementById("downloadBtn");

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        // Create a new submission object
        const submission = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            location: document.getElementById("location").value,
            message: document.getElementById("message").value
        };

        // Get previous submissions
        let allData = JSON.parse(localStorage.getItem("allCustomerData")) || [];

        // Add new submission
        allData.push(submission);

        // Save back to LocalStorage
        localStorage.setItem("allCustomerData", JSON.stringify(allData));

        // Show thank you message
        successMessage.style.display = "block";
        form.reset();
    });

    // Download all submissions as CSV
    downloadBtn.addEventListener("click", function() {
        let allData = JSON.parse(localStorage.getItem("allCustomerData")) || [];
        if(allData.length === 0){
            alert("No submissions yet!");
            return;
        }

        // Convert JSON to CSV
        const header = ["Name", "Email", "Phone", "Location", "Message"];
        const rows = allData.map(item => [item.name, item.email, item.phone, item.location, item.message]);
        let csvContent = header.join(",") + "\n";
        rows.forEach(row => {
            csvContent += row.map(field => `"${field}"`).join(",") + "\n";
        });

        // Create a downloadable link
        const blob = new Blob([csvContent], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "customer_submissions.csv";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    });
  </script>

</body>
</html>
