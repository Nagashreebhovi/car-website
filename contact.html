<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar">
  <div class="logo">CarZone</div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="cars.html">Cars</a></li>
    <li><a href="about.html" class="active">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<div class="page-bg">
  <div class="contact-rectangle">
    <h1>Contact Us</h1>

    <form id="contactForm">

      <label>Full Name</label>
      <input type="text" id="name" placeholder="Enter your full name" required>

      <label>Email</label>
      <input 
        type="email" 
        id="email" 
        placeholder="Enter your email" 
        required
      >

      <label>Phone Number</label>
      <input 
        type="tel" 
        id="phone" 
        placeholder="Enter your phone number"
        pattern="[0-9]{10}" 
        maxlength="10"
        required
      >

      <label>Location</label>
      <input type="text" id="location" placeholder="Enter your location" required>

      <label>Message</label>
      <textarea id="message" placeholder="Type your message" required></textarea>

      <button type="submit">Send Message</button>

      <p id="successMessage" style="display:none; color: rgb(22, 142, 66); text-align:center; margin-top:10px;">
        Thank you for contacting us! We will get back to you soon.
      </p>

    </form>

    <!-- download button -->
    <button id="downloadBtn" style="margin-top:10px;">
      Download All Submissions
    </button>

    <!-- Toggle Social Button -->
    <button 
      id="toggleSocialBtn"
      style="margin-top:15px; padding:10px 20px; background:#1e5eff; color:white; border:none; border-radius:8px; cursor:pointer;"
      onclick="toggleSocial()"
    >
      Hide Social Links
    </button>

    <!-- Social Links -->
    <div class="social" id="socialSection">
      <a href="#">Instagram</a>
      <a href="#">Facebook</a>
      <a href="#">Twitter</a>
    </div>

  </div>
</div>

<script>
  // Form submission
  const form = document.getElementById("contactForm");
  const successMessage = document.getElementById("successMessage");
  const downloadBtn = document.getElementById("downloadBtn");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const submission = {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      phone: document.getElementById("phone").value,
      location: document.getElementById("location").value,
      message: document.getElementById("message").value
    };

    let allData = JSON.parse(localStorage.getItem("allCustomerData")) || [];
    allData.push(submission);
    localStorage.setItem("allCustomerData", JSON.stringify(allData));

    successMessage.style.display = "block";

    setTimeout(() => {
      successMessage.style.display = "none";
    }, 300000); // 5 minutes
  });

  // Download CSV
  downloadBtn.addEventListener("click", function() {
    let allData = JSON.parse(localStorage.getItem("allCustomerData")) || [];

    if (allData.length === 0) {
      alert("No submissions yet!");
      return;
    }

    const header = ["Name", "Email", "Phone", "Location", "Message"];
    const rows = allData.map(item =>
      [item.name, item.email, item.phone, item.location, item.message]
    );

    let csvContent = header.join(",") + "\n";
    rows.forEach(row => {
      csvContent += row.map(field => `"${field}"`).join(",") + "\n";
    });

    const blob = new Blob([csvContent], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "customer_submissions.csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });

  // Show message alert
  function showMessage() {
      alert("Thank you for choosing CarZone!");
  }

  // Show car details
  function showDetails(carName) {
      alert(carName + " is available!\n\nPlease contact us for more details.");
  }

  // Toggle Social Links
  function toggleSocial() {
    const social = document.getElementById("socialSection");
    const btn = document.getElementById("toggleSocialBtn");

    const style = window.getComputedStyle(social).display;

    if (style === "none") {
      social.style.display = "block";
      btn.innerText = "Hide Social Links";
    } else {
      social.style.display = "none";
      btn.innerText = "Show Social Links";
    }
  }
</script>

</body>
</html>
